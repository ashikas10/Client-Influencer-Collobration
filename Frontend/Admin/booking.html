<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="dashboard">
    <div class="content">
        <div class="sidebar">
            <h2>Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Client</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-client.html">Add Client</a></li>
                    <li><a class="dropdown-item" href="manage-client.html">Manage Client</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Influencer</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-influencer.html">Add Influencer</a></li>
                    <li><a class="dropdown-item" href="manage-influencer.html">Manage Influencer</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">User Details</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="client.html">Client</a></li>
                    <li><a class="dropdown-item" href="influencer.html">Influencer</a></li>
                </ul>
            </div>
            <a href="booking.html">Bookings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <div class="container mt-4">
            <h3 class="mb-3">Booking Details</h3>
            <table class="table table-bordered text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Client Name</th>
                        <th>Mobile</th>
                        <th>Influencer</th>
                        <th>Username</th>
                        <th>Budget</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookingBody"></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if(localStorage.getItem("isAdminLoggedIn") !== "true"){
            alert("Access Denied ");
            window.location.href = "admin.html";
        }
        function logout(){
            alert("Logged out successfully");
            window.location.href = "admin.html";
        }
        fetch("https://client-influencer-backend.onrender.com/bookings")
        .then(res => res.json())
        .then(data => {
            const body = document.getElementById("bookingBody");
            data.forEach(b => {
                const row = `
                <tr>
                    <td>${b.id}</td>
                    <td>${b.clientName}</td>
                    <td>${b.clientMobile}</td>
                    <td>${b.influencerName}</td>
                    <td>${b.influencerUsername}</td>
                    <td>${b.budget}</td>
                    <td>${b.status}</td>
                </tr>
                `;
                body.innerHTML += row;
            });
        });
    </script>
</body>
</html>
