<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="dashboard">
    <div class="content">
        <div class="sidebar" style="height:100vh;">
            <h2>Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Client</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-client.html">Add Client</a></li>
                    <li><a class="dropdown-item" href="manage-client.html">Manage Client</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Influencer</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-influencer.html">Add Influencer</a></li>
                    <li><a class="dropdown-item" href="manage-influencer.html">Manage Influencer</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">User Details</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="client.html">Client</a></li>
                    <li><a class="dropdown-item" href="influencer.html">Influencer</a></li>
                </ul>
            </div>
            <a href="booking.html">Bookings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <div class="dash-body">
            <div class="dash-card">
                <p id="totalClients">0</p>
                <p>Total Clients</p>
            </div>
            <div class="dash-card">
                <p id="totalInfluencers">0</p>
                <p>Total Influencers</p>
            </div>
            <div class="dash-card">
                <p id="totalBookings">0</p>
                <p>Total Bookings</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if(localStorage.getItem("isAdminLoggedIn") !== "true"){
            alert("Access Denied");
            window.location.href = "admin.html";
        }
        function logout(){
            alert("Logged out successfully");
            window.location.href = "admin.html";
        }
        function loadDashboard(){
            fetch("http://localhost:8080/api/client/all")
            .then(res => res.json())
            .then(data => {
                document.getElementById("totalClients").innerText = data.length;
            });

            fetch("http://localhost:8080/api/influencer/all")
            .then(res => res.json())
            .then(data => {
                document.getElementById("totalInfluencers").innerText = data.length;
            });

            fetch("http://localhost:8080/bookings")
            .then(res => res.json())
            .then(data => {
                document.getElementById("totalBookings").innerText = data.length;
            });
        }
        loadDashboard();
    </script>
</body>

</html>
