<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Details</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="dashboard">
    <div class="content">
        <div class="sidebar">
            <h2>Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Client</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-client.html">Add Client</a></li>
                    <li><a class="dropdown-item" href="manage-client.html">Manage Client</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Influencer</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-influencer.html">Add Influencer</a></li>
                    <li><a class="dropdown-item" href="manage-influencer.html">Manage Influencer</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">User Details</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="client.html">Client</a></li>
                    <li><a class="dropdown-item" href="influencer.html">Influencer</a></li>
                </ul>
            </div>
            <a href="booking.html">Bookings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <div class="addCli-content">
            <h2 class="addClient-heading">Client Details</h2>
            <div class="modal fade" id="editModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Client</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Name: <input type="text" id="clientName" class="form-control mb-2" placeholder="Name">
                    City: <input type="text" id="clientCity" class="form-control mb-2" placeholder="City">
                    State: <input type="text" id="clientState" class="form-control mb-2" placeholder="State">
                    Brand: <input type="text" id="clientBrand" class="form-control mb-2" placeholder="Brand">
                    Product: <input type="text" id="clientProduct" class="form-control mb-2" placeholder="Product">       
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" onclick="saveClient()">Save</button>
                </div>
                </div>
            </div>
            </div>
            <table class="table table-bordered" id="addClientTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>City</th>
                        <th>State</th>
                        <th>Brand</th>
                        <th>Product</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="addClientBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if(localStorage.getItem("isAdminLoggedIn") !== "true"){
            alert("Access Denied");
            window.location.href = "admin.html";
        }
        function logout(){
            localStorage.clear();
            alert("Logged out successfully");
            window.location.href = "admin.html";
        }
        async function loadClients(){

            const response = await fetch("http://localhost:8080/api/addclient/all");
            const clients = await response.json();

            const tableBody = document.getElementById("addClientBody");
            tableBody.innerHTML = "";

            clients.forEach(addclient => {

                const row = `
                <tr>
                    <td>${addclient.id}</td>
                    <td>${addclient.name}</td>
                    <td>${addclient.city}</td>
                    <td>${addclient.state}</td>
                    <td>${addclient.brand}</td>
                    <td>${addclient.product}</td>
                    <td>
                        <button onclick="change(event)" class="btn-edit">Edit</button>
                    </td>
                </tr>
                `;

                tableBody.innerHTML += row;

            });

        }
        loadClients();

        let editRow = null;

        function change(event){
            editRow = event.target.parentElement.parentElement;

            document.getElementById("clientName").value = editRow.cells[1].textContent;
            document.getElementById("clientCity").value = editRow.cells[2].textContent;
            document.getElementById("clientState").value = editRow.cells[3].textContent;
            document.getElementById("clientBrand").value = editRow.cells[4].textContent;
            document.getElementById("clientProduct").value = editRow.cells[5].textContent;

            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }
        async function saveClient() {
            if(editRow == null) return;

            const updatedClient = {
                id: Number(editRow.cells[0].textContent),
                name: document.getElementById("clientName").value,
                city: document.getElementById("clientCity").value,
                state: document.getElementById("clientState").value,
                brand: document.getElementById("clientBrand").value,
                product: document.getElementById("clientProduct").value
            };

            try {
                const response = await fetch(`http://localhost:8080/api/addclient/${updatedClient.id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedClient)
                });

                if(response.ok){
                    editRow.cells[1].textContent = updatedClient.name;
                    editRow.cells[2].textContent = updatedClient.city;
                    editRow.cells[3].textContent = updatedClient.state;
                    editRow.cells[4].textContent = updatedClient.brand;
                    editRow.cells[5].textContent = updatedClient.product;

                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();

                    alert("Updated Successfully!");
                    editRow = null;
                }
            } 
            catch(error) {
                console.error(error);
                alert("Error!");
            }
        }
    </script>
</body>
</html>
