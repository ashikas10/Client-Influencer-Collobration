<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">
</head>
<body class="signup">
    <h1 id="ab">Client-Influencer Collaboration Platform</h1>
    <form id="signup-form">
    <div class="col-mb3">
        <label class="form-label">Email Id :</label>
        <input type="email" id="email" name="email" placeholder="Enter Email"  style="margin-left: 50px;" required ><br>
        </div>
        <div class="password-box">
            <label>Password :</label>
            <input  type="password" id="password" name="password" placeholder="Enter Password" style="margin-left: 42px;" required>
        </div>
        <div class="password-box">
            <label> Confirm Password :</label>
            <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Enter Password" required>
        </div>
        <button type="submit" class="btn-ctl">Sign Up</button>
        <p id="cc"> Already have an account?<ins><a href="login.html">Login</ins></a></p>
    </form>
    <script>
document.getElementById("signup-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmpassword = document.getElementById("confirmpassword").value;

    const API_URL = "https://client-influencer-backend.onrender.com/api";

    try {
        const response = await fetch(`${API_URL}/signup`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password,
                confirmpassword
            })
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message);
        } else {
            alert(result.message);
            window.location.href = "index.html";
        }

    } catch (error) {
        alert("Something went wrong!");
        console.log(error);
    }
});
</script>
</body>
</html>
