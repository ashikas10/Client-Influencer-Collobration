<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Influencer Dashboard</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="inf-profile">

<div class="topbar">
    <h3 id="welcomeText">Welcome 👋</h3>

    <div class="profile-menu">

    <div class="profile-circle" onclick="toggleDropdown()" id="profileCircle"></div>

    <div id="dropdown" class="dropdown">
        <p id="profileName"></p>
        <p onclick="logout()">Logout</p>
    </div>

</div>
</div>

<div class="dashboard">

    <!-- Stats -->
    <div class="cards">
        <div class="card-box total">
            <h4 id="total">0</h4>
            <p>Total Requests</p>
        </div>

        <div class="card-box accepted">
            <h4 id="accepted">0</h4>
            <p>Accepted</p>
        </div>

        <div class="card-box pending">
            <h4 id="pending">0</h4>
            <p>Pending</p>
        </div>

        <div class="card-box rejected">
            <h4 id="rejected">0</h4>
            <p>Rejected</p>
        </div>
    </div>

    <!-- Table -->
    <div class="table-box">
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Client</th>
                    <th>Mobile No</th>
                    <th>Budget</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="bookingBody"></tbody>
        </table>
    </div>

</div>

<script>

const influencerName = localStorage.getItem("influencerName") || "Influencer";

const firstLetter = influencerName.charAt(0).toUpperCase();

document.getElementById("profileCircle").innerText = firstLetter;
document.getElementById("profileName").innerText = influencerName;
document.getElementById("welcomeText").innerText = "Welcome " + influencerName + " 👋";

fetch("http://localhost:8080/bookings")
.then(res => res.json())
.then(data => {

    const body = document.getElementById("bookingBody");

    let total = 0;
    let accepted = 0;
    let pending = 0;
    let rejected = 0;

    data.forEach(b => {

        if(b.influencerName.trim().toLowerCase() === influencerName.trim().toLowerCase()){

            total++;

            if(b.status === "ACCEPTED") accepted++;
            else if(b.status === "PENDING") pending++;
            else if(b.status === "REJECTED") rejected++;

            const row = `
            <tr>
                <td>${b.clientName}</td>
                <td>${b.clientMobile}</td>
                <td>${b.budget}</td>
                <td>${b.status}</td>
                <td>
                    ${
                        b.status === "PENDING"
                        ? `
                        <button class="btn btn-success btn-sm" onclick="updateStatus(${b.id}, 'ACCEPTED')">Accept</button>
                        <button class="btn btn-danger btn-sm" onclick="updateStatus(${b.id}, 'REJECTED')">Reject</button>
                        `
                        : "-"
                    }
                </td>
            </tr>
            `;

            body.innerHTML += row;
        }
    });

    // Set counts
    document.getElementById("total").innerText = total;
    document.getElementById("accepted").innerText = accepted;
    document.getElementById("pending").innerText = pending;
    document.getElementById("rejected").innerText = rejected;

});

// Update status
function updateStatus(id, status){

    fetch(`http://localhost:8080/booking/${id}/status?status=${status}`, {
        method: "PUT"
    })
    .then(() => location.reload())
    .catch(err => console.error(err));
}

// Dropdown
function toggleDropdown(){
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}
window.onclick = function(e){
    if(!e.target.closest(".profile-circle")){
        document.getElementById("dropdown").style.display = "none";
    }
}
// Logout
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
