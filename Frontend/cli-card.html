<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client-Influencer Collaboration Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cli-card">
  <div class="navbar" style="margin: 0px; padding: 0px;">
    <nav>
        <div class="title">
            <h3>Client-Influencer Collaboration Platform</h3>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign up</a>
        </div>

        <div class="burger" onclick="toggleMenu()">
            ☰
        </div>

    </nav>
    </div>
    <h1>Confirm Your Influencer</h1>
    <div class="card-row" id="influencerDetailBody"></div>
    <a href="client-profile.html">
      <button type="button" class="but">Back</button>
    </a>
  <script>
const API_URL = "https://client-influencer-backend.onrender.com/api";

async function loadInfluencers() {
    try {
        const response = await fetch(`${API_URL}/api/addinfluencer/all`);

        if (!response.ok) {
            throw new Error("Failed to load influencers");
        }

        const influencer = await response.json();

        const container = document.getElementById("influencerDetailBody");
        container.innerHTML = "";

        influencer.forEach(influencerDetail => {

            const card = `
            <div class="card">
                <p>Name: ${influencerDetail.name}</p>
                <p>Instagram UserName: ${influencerDetail.instaUserName}</p>
                <p>Product Category: ${influencerDetail.product}</p>
                <p>Budget: ${influencerDetail.budget}</p>
                <button onclick="confirmBooking('${influencerDetail.name}','${influencerDetail.instaUserName}','${influencerDetail.budget}')" class="btn-detail">Confirm</button>
            </div>
            `;

            container.innerHTML += card;
        });

    } catch (error) {
        console.log(error);
        document.getElementById("influencerDetailBody").innerHTML = "<p>Failed to load data</p>";
    }
}

loadInfluencers();

function confirmBooking(name, username, budget) {

    const clientName = localStorage.getItem("clientName");
    const clientMobile = localStorage.getItem("clientMobile");

    if (!clientName || !clientMobile) {
        alert("Please login again");
        window.location.href = "login.html";
        return;
    }

    const bookingData = {
        clientName: clientName,
        clientMobile: clientMobile,
        influencerName: name,
        influencerUsername: username,
        budget: budget,
        status: "PENDING"
    };

    fetch(`${API_URL}/bookings`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(bookingData)
    })
    .then(res => {
        if(res.ok){
            alert("Booking Successful");
            window.location.href="client-profile.html";
        } else {
            alert("Booking Failed");
        }
    })
    .catch(err => {
        console.log(err);
        alert("Something went wrong");
    });
}
</script>
</body>
</html>
