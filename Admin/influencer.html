<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Details</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="dashboard">
    <div class="content">
        <div class="inf-sidebar">
            <h2>Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Client</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-client.html">Add Client</a></li>
                    <li><a class="dropdown-item" href="manage-client.html">Manage Client</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Influencer</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-influencer.html">Add Influencer</a></li>
                    <li><a class="dropdown-item" href="manage-influencer.html">Manage Influencer</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">User Details</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="client.html">Client</a></li>
                    <li><a class="dropdown-item" href="influencer.html">Influencer</a></li>
                </ul>
            </div>
            <a href="booking.html">Bookings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <div class="inf-content">
            <h2 class="inf-heading">Influencer Details</h2>
            <div class="modal fade" id="viewModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">View Influencer Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="infName" class="form-control mb-2">
                    <input type="text" id="infEmail" class="form-control mb-2">
                    <input type="text" id="infMobile" class="form-control mb-2">
                    <input type="text" id="infGender" class="form-control mb-2">
                    <input type="text" id="infPlatform" class="form-control mb-2">
                    <input type="text" id="infInsta" class="form-control mb-2">
                    <input type="text" id="infBudget" class="form-control mb-2">
                    <input type="text" id="infCategory" class="form-control mb-2">
                    <input type="text" id="infOthers" class="form-control mb-2">   
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" onclick="deleteItem()">Delete</button>
                </div>
                </div>
            </div>
            </div>
            <table class="table table-bordered" id="influencerTable">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email Id</th>
                    <th>Mobile</th>
                    <th>Budget</th>
                    <th>Action</th>
                </tr>
                <tbody id="influencerBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    if(localStorage.getItem("isAdminLoggedIn") !== "true"){
        alert("Access Denied ❌");
        window.location.href = "Admin.html";
    }

    function logout(){
        localStorage.clear();
        alert("Logged out successfully");
        window.location.href = "Admin.html";
    }

    let selectedId = null;
    let influencerList = []; // ✅ ADD THIS

    async function loadInfluencers(){

        const response = await fetch("http://localhost:8080/api/influencer/all");
        influencerList = await response.json(); // ✅ STORE DATA

        const tableBody = document.getElementById("influencerBody");
        tableBody.innerHTML = "";

        influencerList.forEach((inf, index) => {

            const row = `
            <tr>
                <td>${index + 1}</td>
                <td>${inf.name}</td>
                <td>${inf.email}</td>
                <td>${inf.mobile}</td>
                <td>${inf.budget}</td>
                <td>
                    <button onclick="viewItem(${index})" class="btn btn-primary btn-sm">View</button>
                </td>
            </tr>
            `;

            tableBody.innerHTML += row;
        });
    }

    loadInfluencers();

    function viewItem(index){

        const influencer = influencerList[index]; // ✅ FIX

        selectedId = influencer.id;

        document.getElementById("infName").value = influencer.name;
        document.getElementById("infEmail").value = influencer.email;
        document.getElementById("infMobile").value = influencer.mobile;
        document.getElementById("infGender").value = influencer.gender;
        document.getElementById("infPlatform").value = influencer.platform;
        document.getElementById("infInsta").value = influencer.instauser;
        document.getElementById("infBudget").value = influencer.budget;
        document.getElementById("infCategory").value = influencer.product;
        document.getElementById("infOthers").value = influencer.others;

        let modal = new bootstrap.Modal(document.getElementById('viewModal'));
        modal.show();
    }

    async function deleteItem(){

        if(!confirm("Are you sure to delete?")) return;

        try {
            const response = await fetch(`http://localhost:8080/api/influencer/${selectedId}`, {
                method: "DELETE"
            });

            if(response.ok){
                alert("Deleted Successfully!");

                bootstrap.Modal.getInstance(document.getElementById('viewModal')).hide();

                loadInfluencers();
            }
            else{
                alert("Delete failed!");
            }

        } catch(error){
            console.error(error);
            alert("Error!");
        }
    }
    </script>
</body>
</html>
