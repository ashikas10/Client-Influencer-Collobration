<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Influencer</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="dashboard">
    <div class="content">
        <div class="add-sidebar">
            <h2>Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Client</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-client.html">Add Client</a></li>
                    <li><a class="dropdown-item" href="manage-client.html">Manage Client</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Influencer</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-influencer.html">Add Influencer</a></li>
                    <li><a class="dropdown-item" href="manage-influencer.html">Manage Influencer</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">User Details</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="client.html">Client</a></li>
                    <li><a class="dropdown-item" href="influencer.html">Influencer</a></li>
                </ul>
            </div>
            <a href="booking.html">Bookings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <form class="row g-3" id="add-influencer-form" style="margin-top: 20px;">
            <h2>Add Influencer Details</h2>
            <div class="col-md-10" style="margin-top: -10px;">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" placeholder="Name" required >
            </div>
            <div class="col-10"style="margin-top: -10px;">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" placeholder="City" required>
            </div>
            <div class="col-10" style="margin-top: -10px;">
                <label class="form-label">State</label>
                <input type="text" name="state" class="form-control" placeholder="State" required>
            </div>
            <div class="col-10" style="margin-top: -10px;">
                <label class="form-label">Instagram UserName</label>
                <input type="text" name="instaUserName" class="form-control" placeholder="Instagram UserName" required>
            </div>
            <div class="col-10" style="margin-top: -10px;">
                <label class="form-label">Budget</label>
                <input type="text" name="budget" class="form-control" placeholder="Budget" required>
            </div>
            <div class="col-10" style="margin-top: -10px;">
                <label class="form-label">Product Category</label>
                <select class="form-control" name="product" required>
                    <option selected>Product Category</option>
                    <option value="fashion" >Fashion</option>
                    <option value="beauty" >Beauty</option>
                    <option value="food" >Food</option>
                    <option value="travel" >Travel</option>
                    <option value="fitness" >Fitness</option>
                    <option value="technology" >Technology</option>
                    <option value="education" >Education</option>
                </select>
            </div>
            <div class="col-12" style="margin-top: -10px;">
                <button type="submit" class="btn btn-primary">Add Influencer</button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
function logout(){
    alert("Logged out successfully");
    window.location.href = "Admin.html";
}

const API_URL = "https://your-backend-name.onrender.com";

document.getElementById("add-influencer-form").addEventListener("submit", async function(e) {

    e.preventDefault(); 

    const formData = new FormData(this);

    try {

        const response = await fetch(`${API_URL}/api/addinfluencer/save`, {
            method: "POST",
            body: formData
        });

        const result = await response.text();

        if (response.ok && result === "Influencer Added Successfully") {
            alert("Influencer Added Successfully");
            window.location.href = "manage-influencer.html";
        } else {
            alert(result || "Failed to add influencer");
        }

    } catch (error) {
        alert("Something went wrong!");
        console.log(error);
    }

});
</script>
</body>
</html>
