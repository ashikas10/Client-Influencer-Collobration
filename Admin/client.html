<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Details</title>
    <link rel="stylesheet" href="adminstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="dashboard">
    <div class="content">
        <div class="cli-sidebar">
            <h2>Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Client</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-client.html">Add Client</a></li>
                    <li><a class="dropdown-item" href="manage-client.html">Manage Client</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">Influencer</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="add-influencer.html">Add Influencer</a></li>
                    <li><a class="dropdown-item" href="manage-influencer.html">Manage Influencer</a></li>
                </ul>
            </div>
            <div class="dropdown mb-3">
                <a class="dropdown-toggle sidebar-link" data-bs-toggle="dropdown">User Details</a>
                <ul class="dropdown-menu" style="background-color: #243b5e;">
                    <li><a class="dropdown-item" href="client.html">Client</a></li>
                    <li><a class="dropdown-item" href="influencer.html">Influencer</a></li>
                </ul>
            </div>
            <a href="booking.html">Bookings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <div class="cli-content">
            <h2 class="client-heading">Client Details</h2>
            <table class="table table-bordered" id="clientTable">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email Id</th>
                    <th>Mobile</th>
                    <th>Brand</th>
                    <th>Product Category</th>
                    <th>Action</th>
                </tr>
                <tbody id="clientBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if(localStorage.getItem("isAdminLoggedIn") !== "true"){
            alert("Access Denied");
            window.location.href = "Admin.html";
        }
        function logout(){
            alert("Logged out successfully");
            window.location.href = "Admin.html";
        }
        async function loadClients(){

            const response = await fetch("http://localhost:8080/api/client/all");
            const clients = await response.json();

            const tableBody = document.getElementById("clientBody");
            tableBody.innerHTML = "";

            clients.forEach((client,index) => {

                const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${client.name}</td>
                    <td>${client.email}</td>
                    <td>${client.mobile}</td>
                    <td>${client.brand}</td>
                    <td>${client.category}</td>
                    <td>
                        <button onclick="deleteItem(${client.id}, this)" class="btn-del">Delete</button>
                    </td>
                </tr>
                `;

                tableBody.innerHTML += row;

            });

        }

        loadClients();
        async function deleteItem(id, btn){

            if(!confirm("Are you sure to delete?")) return;

            try {
                const response = await fetch(`http://localhost:8080/api/client/${id}`, {
                    method: "DELETE"
                });

                if(response.ok){
                    const row = btn.parentElement.parentElement;
                    row.remove();

                    alert("Deleted Successfully!");
                }
                else{
                    alert("Delete failed!");
                }

            } catch(error){
                console.error(error);
                alert("Error!");
            }
        }
    </script>
</body>
</html>
